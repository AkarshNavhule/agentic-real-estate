name: Build and Push to Azure

# Trigger this workflow whenever code is pushed to the 'main' branch
on:
  push:
    branches:
      - main

# Define the environment variables (You will set these in GitHub Secrets)
env:
  REGISTRY_NAME: agenticacr2026.azurecr.io
  BACKEND_IMAGE: agentic-backend
  FRONTEND_IMAGE: agentic-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Build and Push Backend
      run: |
        docker build ./backend -t ${{ env.REGISTRY_NAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} -t ${{ env.REGISTRY_NAME }}/${{ env.BACKEND_IMAGE }}:latest
        docker push ${{ env.REGISTRY_NAME }}/${{ env.BACKEND_IMAGE }} --all-tags

    - name: Build and Push Frontend
      run: |
        docker build ./frontend -t ${{ env.REGISTRY_NAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} -t ${{ env.REGISTRY_NAME }}/${{ env.FRONTEND_IMAGE }}:latest
        docker push ${{ env.REGISTRY_NAME }}/${{ env.FRONTEND_IMAGE }} --all-tags

    - name: Log into Azure CLI
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Update Backend Container App
      uses: azure/cli@v1
      with:
        inlineScript: |
          az containerapp update \
            --name agentic-backend-app \
            --resource-group agentic-rg \
            --image ${{ env.REGISTRY_NAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

    - name: Update Frontend Container App
      uses: azure/cli@v1
      with:
        inlineScript: |
          az containerapp update \
            --name agentic-frontend-app \
            --resource-group agentic-rg \
            --image ${{ env.REGISTRY_NAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}